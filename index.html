<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots and Boxes - For Avisha & Dharmik</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-top: 0;
        }

        .role-indicator {
            font-size: 1rem;
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .player {
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .avisha { color: #ff4d4d; border: 2px solid transparent; }
        .dharmik { color: #3b82f6; border: 2px solid transparent; }

        .avisha.active { border-color: #ff4d4d; background: #ffe6e6; }
        .dharmik.active { border-color: #3b82f6; background: #e6f0ff; }

        .board-wrapper {
            position: relative;
            background: #fafafa;
            border-radius: 8px;
            padding: 10px;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        /* Modals and Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .role-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .role-btn {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }

        .role-btn:hover { transform: scale(1.05); }
        .btn-avisha { background: #ff4d4d; }
        .btn-dharmik { background: #3b82f6; }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            animation: fadeInOut 1.5s ease-in-out forwards;
        }

        .modal-content {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -40%); }
            15% { opacity: 1; transform: translate(-50%, -50%); }
            85% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -60%); }
        }
    </style>
</head>
<body>

    <!-- Role Selection Interface -->
    <div id="roleOverlay" class="overlay">
        <div class="role-box">
            <h2>Choose Who Is Playing:</h2>
            <button class="role-btn btn-avisha" onclick="selectRole('Avisha')">Avisha</button>
            <button class="role-btn btn-dharmik" onclick="selectRole('Dharmik')">Dharmik</button>
        </div>
    </div>

    <div class="game-container">
        <h1>Dots & Boxes Online</h1>
        <div id="identityDisplay" class="role-indicator">Playing As: Guest</div>
        
        <div class="scoreboard">
            <div class="player avisha">Avisha (Red): <span id="score-avisha">0</span></div>
            <div class="player dharmik">Dharmik (Blue): <span id="score-dharmik">0</span></div>
        </div>

        <div class="board-wrapper">
            <canvas id="gameBoard" width="400" height="400"></canvas>
        </div>
        <button id="resetBtn" style="margin-top: 15px; padding: 8px 16px; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; background: #fff; font-weight: bold;">Reset Game</button>
    </div>

    <!-- Turn Popup Message -->
    <div id="turnModal" class="modal">
        <div class="modal-content" id="modalText"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBLx63V0jvG6-4bEJuiJMnctjNFc6Mpdk",
          authDomain: "dots-and-boxes-5c025.firebaseapp.com",
          databaseURL: "https://dots-and-boxes-5c025-default-rtdb.firebaseio.com",
          projectId: "dots-and-boxes-5c025",
          storageBucket: "dots-and-boxes-5c025.firebasestorage.app",
          messagingSenderId: "975478545136",
          appId: "1:975478545136:web:ad77b347853892739e8035",
          measurementId: "G-R0C55Z9YT5"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const gameRef = database.ref("shared_game_state");

        const canvas = document.getElementById("gameBoard");
        const ctx = canvas.getContext("2d");
        const modal = document.getElementById("turnModal");
        const modalText = document.getElementById("modalText");

        const GRID_SIZE = 5;
        const CELL_SIZE = 80;
        const OFFSET = 40;
        const LINE_THICKNESS = 6;
        const DOT_RADIUS = 6;

        const AVISHA = { name: "Avisha", color: "#ff4d4d" };
        const DHARMIK = { name: "Dharmik", color: "#3b82f6" };

        let myRole = null; // Local identity tracking
        let gameState = {
            currentPlayerName: "Avisha",
            scores: { Avisha: 0, Dharmik: 0 },
            lines: [],
            boxes: []
        };
        let isTurnLocked = false; 

        function selectRole(role) {
            myRole = role;
            document.getElementById("roleOverlay").style.display = "none";
            document.getElementById("identityDisplay").innerText = `Playing As: ${role}`;
            document.getElementById("identityDisplay").style.color = role === "Avisha" ? AVISHA.color : DHARMIK.color;
        }

        function generateInitialState() {
            let localLines = [];
            let localBoxes = [];
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE - 1; c++) {
                    localLines.push({ x1: c, y1: r, x2: c + 1, y2: r, type: 'H', owner: null });
                }
            }
            for (let r = 0; r < GRID_SIZE - 1; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    localLines.push({ x1: c, y1: r, x2: c, y2: r + 1, type: 'V', owner: null });
                }
            }
            for (let r = 0; r < GRID_SIZE - 1; r++) {
                for (let c = 0; c < GRID_SIZE - 1; c++) {
                    localBoxes.push({ r, c, owner: null });
                }
            }
            return {
                currentPlayerName: "Avisha",
                scores: { Avisha: 0, Dharmik: 0 },
                lines: localLines,
                boxes: localBoxes
            };
        }

        gameRef.on("value", (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                gameState = generateInitialState();
                gameRef.set(gameState);
                return;
            }
            
            const turnSwitched = gameState.currentPlayerName !== data.currentPlayerName;
            gameState = data;
            
            updateUI();
            draw();

            if (turnSwitched) {
                showTurnPopup();
            }
        });

        function showTurnPopup() {
            isTurnLocked = true; 
            modalText.innerText = `${gameState.currentPlayerName}'s Turn!`;
            modalText.style.borderColor = gameState.currentPlayerName === "Avisha" ? AVISHA.color : DHARMIK.color;
            modal.style.display = "block";

            modal.style.animation = 'none';
            modal.offsetHeight; 
            modal.style.animation = null;

            setTimeout(() => {
                modal.style.display = "none";
                isTurnLocked = false; 
            }, 1500);
        }

        function updateUI() {
            document.getElementById("score-avisha").innerText = gameState.scores.Avisha;
            document.getElementById("score-dharmik").innerText = gameState.scores.Dharmik;
            
            document.querySelector(".player.avisha").classList.toggle("active", gameState.currentPlayerName === "Avisha");
            document.querySelector(".player.dharmik").classList.toggle("active", gameState.currentPlayerName === "Dharmik");
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameState.boxes || !gameState.lines) return;

            gameState.boxes.forEach(box => {
                if (box.owner) {
                    ctx.fillStyle = box.owner === "Avisha" ? "rgba(255, 77, 77, 0.15)" : "rgba(59, 130, 246, 0.15)";
                    ctx.fillRect(OFFSET + box.c * CELL_SIZE, OFFSET + box.r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            });

            gameState.lines.forEach(line => {
                ctx.beginPath();
                ctx.lineWidth = LINE_THICKNESS;
                ctx.lineCap = "round";
                ctx.strokeStyle = line.owner ? (line.owner === "Avisha" ? AVISHA.color : DHARMIK.color) : "#e0e0e0";
                ctx.moveTo(OFFSET + line.x1 * CELL_SIZE, OFFSET + line.y1 * CELL_SIZE);
                ctx.lineTo(OFFSET + line.x2 * CELL_SIZE, OFFSET + line.y2 * CELL_SIZE);
                ctx.stroke();
            });

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    ctx.beginPath();
                    ctx.arc(OFFSET + c * CELL_SIZE, OFFSET + r * CELL_SIZE, DOT_RADIUS, 0, 2 * Math.PI);
                    ctx.fillStyle = "#444";
                    ctx.fill();
                }
            }
        }

        canvas.addEventListener("click", (e) => {
            if (isTurnLocked) return; 
            
            // STRICT TURN LOCK: Only allow input if the active game turn matches your selected profile role
            if (myRole !== gameState.currentPlayerName) {
                alert(`It's not your turn! Wait for ${gameState.currentPlayerName}.`);
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            let closestLine = null;
            let minDist = 15; 

            gameState.lines.forEach(line => {
                if (line.owner) return;

                let midX, midY;
                if (line.type === 'H') {
                    midX = OFFSET + (line.x1 + 0.5) * CELL_SIZE;
                    midY = OFFSET + line.y1 * CELL_SIZE;
                } else {
                    midX = OFFSET + line.x1 * CELL_SIZE;
                    midY = OFFSET + (line.y1 + 0.5) * CELL_SIZE;
                }

                let dist = Math.hypot(clickX - midX, clickY - midY);
                if (dist < minDist) {
                    minDist = dist;
                    closestLine = line;
                }
            });

            if (closestLine) {
                closestLine.owner = gameState.currentPlayerName;
                let boxScored = checkBoxes();

                if (boxScored) {
                    if (gameState.boxes.every(b => b.owner !== null)) {
                        setTimeout(() => alert("Game Over! Check final scores on screen."), 300);
                    }
                } else {
                    gameState.currentPlayerName = gameState.currentPlayerName === "Avisha" ? "Dharmik" : "Avisha";
                }
                
                gameRef.set(gameState);
            }
        });

        function checkBoxes() {
            let closedAnyBox = false;

            gameState.boxes.forEach(box => {
                if (box.owner) return;

                let top = gameState.lines.find(l => l.type === 'H' && l.y1 === box.r && l.x1 === box.c);
                let bottom = gameState.lines.find(l => l.type === 'H' && l.y1 === box.r + 1 && l.x1 === box.c);
                let left = gameState.lines.find(l => l.type === 'V' && l.x1 === box.c && l.y1 === box.r);
                let right = gameState.lines.find(l => l.type === 'V' && l.x1 === box.c + 1 && l.y1 === box.r);

                if (top.owner && bottom.owner && left.owner && right.owner) {
                    box.owner = gameState.currentPlayerName;
                    gameState.scores[gameState.currentPlayerName]++;
                    closedAnyBox = true;
                }
            });

            return closedAnyBox;
        }

        document.getElementById("resetBtn").addEventListener("click", () => {
            gameRef.set(generateInitialState());
        });
    </script>
</body>
</html>
