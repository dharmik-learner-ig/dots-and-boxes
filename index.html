<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dots and Boxes - For Avisha & Dharmik</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%);
            --color-avisha: #ff5e7e;
            --color-dharmik: #4a90e2;
            --shadow-avisha: 0 0 15px rgba(255, 94, 126, 0.6);
            --shadow-dharmik: 0 0 15px rgba(74, 144, 226, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--color-avisha), var(--color-dharmik));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 5px 0;
        }

        .role-indicator {
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }

        .player {
            flex: 1;
            padding: 10px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .avisha { color: var(--color-avisha); }
        .dharmik { color: var(--color-dharmik); }

        .avisha.active { 
            border-color: var(--color-avisha); 
            background: white;
            box-shadow: var(--shadow-avisha);
        }
        .dharmik.active { 
            border-color: var(--color-dharmik); 
            background: white;
            box-shadow: var(--shadow-dharmik);
        }

        .score-num {
            display: block;
            font-size: 1.5rem;
            margin-top: 2px;
        }

        .board-wrapper {
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        #resetBtn {
            margin-top: 15px;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            background: #1a202c;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        /* Modals and Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .role-box {
            background: white;
            padding: 30px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 320px;
        }

        .role-box h2 {
            margin-top: 0;
            color: #1a202c;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .role-btn {
            font-size: 1.1rem;
            font-weight: 700;
            padding: 14px 0;
            width: 100%;
            margin: 8px 0;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: white;
        }

        .btn-avisha { background: linear-gradient(135deg, #ff7b93, var(--color-avisha)); }
        .btn-dharmik { background: linear-gradient(135deg, #6ba4e8, var(--color-dharmik)); }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            width: 80%;
            max-width: 300px;
            animation: fadeInOut 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .modal-content {
            background: rgba(26, 32, 44, 0.95);
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            border: 2px solid transparent;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.9); }
        }
    </style>
</head>
<body>

    <div id="roleOverlay" class="overlay">
        <div class="role-box">
            <h2>Select Your Profile</h2>
            <button class="role-btn btn-avisha" onclick="selectRole('Avisha')">Avisha</button>
            <button class="role-btn btn-dharmik" onclick="selectRole('Dharmik')">Dharmik</button>
        </div>
    </div>

    <div class="game-container">
        <h1>Dots & Boxes</h1>
        <div id="identityDisplay" class="role-indicator">Connecting...</div>
        
        <div class="scoreboard">
            <div class="player avisha">Avisha <span id="score-avisha" class="score-num">0</span></div>
            <div class="player dharmik">Dharmik <span id="score-dharmik" class="score-num">0</span></div>
        </div>

        <div class="board-wrapper">
            <canvas id="gameBoard" width="360" height="360"></canvas>
        </div>
        <button id="resetBtn">Reset Arena</button>
    </div>

    <div id="turnModal" class="modal">
        <div class="modal-content" id="modalText"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBLx63V0jvG6-4bEJuiJMnctjNFc6Mpdk",
          authDomain: "dots-and-boxes-5c025.firebaseapp.com",
          databaseURL: "https://dots-and-boxes-5c025-default-rtdb.firebaseio.com",
          projectId: "dots-and-boxes-5c025",
          storageBucket: "dots-and-boxes-5c025.firebasestorage.app",
          messagingSenderId: "975478545136",
          appId: "1:975478545136:web:ad77b347853892739e8035",
          measurementId: "G-R0C55Z9YT5"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const gameRef = database.ref("shared_game_state");

        const canvas = document.getElementById("gameBoard");
        const ctx = canvas.getContext("2d");
        const modal = document.getElementById("turnModal");
        const modalText = document.getElementById("modalText");

        const GRID_SIZE = 5;
        const CELL_SIZE = 70;
        const OFFSET = 40;
        const LINE_THICKNESS = 6;
        const DOT_RADIUS = 5;

        const COLOR_AVISHA = "#ff5e7e";
        const COLOR_DHARMIK = "#4a90e2";

        let myRole = null; 
        let gameState = {
            currentPlayerName: "Avisha",
            scores: { Avisha: 0, Dharmik: 0 },
            lines: [],
            boxes: []
        };
        let isTurnLocked = false; 

        function selectRole(role) {
            myRole = role;
            document.getElementById("roleOverlay").style.display = "none";
            document.getElementById("identityDisplay").innerText = `Playing As: ${role}`;
            document.getElementById("identityDisplay").style.color = role === "Avisha" ? COLOR_AVISHA : COLOR_DHARMIK;
        }

        function generateInitialState() {
            let localLines = [];
            let localBoxes = [];
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE - 1; c++) {
                    localLines.push({ x1: c, y1: r, x2: c + 1, y2: r, type: 'H', owner: null });
                }
            }
            for (let r = 0; r < GRID_SIZE - 1; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    localLines.push({ x1: c, y1: r, x2: c, y2: r + 1, type: 'V', owner: null });
                }
            }
            for (let r = 0; r < GRID_SIZE - 1; r++) {
                for (let c = 0; c < GRID_SIZE - 1; c++) {
                    localBoxes.push({ r, c, owner: null });
                }
            }
            return {
                currentPlayerName: "Avisha",
                scores: { Avisha: 0, Dharmik: 0 },
                lines: localLines,
                boxes: localBoxes
            };
        }

        gameRef.on("value", (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                gameState = generateInitialState();
                gameRef.set(gameState);
                return;
            }
            
            const turnSwitched = gameState.currentPlayerName !== data.currentPlayerName;
            gameState = data;
            
            updateUI();
            draw();

            if (turnSwitched) {
                showTurnPopup();
            }
        });

        function showTurnPopup() {
            isTurnLocked = true; 
            const isAvisha = gameState.currentPlayerName === "Avisha";
            
            modalText.innerText = isAvisha ? "Avisha's Turn" : "Dharmik's Turn";
            modalText.style.borderColor = isAvisha ? COLOR_AVISHA : COLOR_DHARMIK;
            modal.style.display = "block";

            modal.style.animation = 'none';
            modal.offsetHeight; 
            modal.style.animation = null;

            setTimeout(() => {
                modal.style.display = "none";
                isTurnLocked = false; 
            }, 1500);
        }

        function updateUI() {
            document.getElementById("score-avisha").innerText = gameState.scores.Avisha;
            document.getElementById("score-dharmik").innerText = gameState.scores.Dharmik;
            
            document.querySelector(".player.avisha").classList.toggle("active", gameState.currentPlayerName === "Avisha");
            document.querySelector(".player.dharmik").classList.toggle("active", gameState.currentPlayerName === "Dharmik");
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!gameState.boxes || !gameState.lines) return;

            gameState.boxes.forEach(box => {
                if (box.owner) {
                    ctx.fillStyle = box.owner === "Avisha" ? "rgba(255, 94, 126, 0.08)" : "rgba(74, 144, 226, 0.08)";
                    ctx.fillRect(OFFSET + box.c * CELL_SIZE, OFFSET + box.r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            });

            gameState.lines.forEach(line => {
                ctx.beginPath();
                ctx.lineWidth = LINE_THICKNESS;
                ctx.lineCap = "round";
                ctx.strokeStyle = line.owner ? (line.owner === "Avisha" ? COLOR_AVISHA : COLOR_DHARMIK) : "#f1f5f9";
                ctx.moveTo(OFFSET + line.x1 * CELL_SIZE, OFFSET + line.y1 * CELL_SIZE);
                ctx.lineTo(OFFSET + line.x2 * CELL_SIZE, OFFSET + line.y2 * CELL_SIZE);
                ctx.stroke();
            });

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    ctx.beginPath();
                    ctx.arc(OFFSET + c * CELL_SIZE, OFFSET + r * CELL_SIZE, DOT_RADIUS, 0, 2 * Math.PI);
                    ctx.fillStyle = "#cbd5e1";
                    ctx.fill();
                }
            }
        }

        function handleInteraction(clientX, clientY) {
            if (isTurnLocked) return; 
            if (myRole !== gameState.currentPlayerName) return;

            const rect = canvas.getBoundingClientRect();
            // Calculate scale factor in case mobile CSS resized the canvas visually
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (clientX - rect.left) * scaleX;
            const clickY = (clientY - rect.top) * scaleY;

            let closestLine = null;
            let minDist = 24; // Increased distance threshold to make tapping easier on phones

            gameState.lines.forEach(line => {
                if (line.owner) return;

                let midX, midY;
                if (line.type === 'H') {
                    midX = OFFSET + (line.x1 + 0.5) * CELL_SIZE;
                    midY = OFFSET + line.y1 * CELL_SIZE;
                } else {
                    midX = OFFSET + line.x1 * CELL_SIZE;
                    midY = OFFSET + (line.y1 + 0.5) * CELL_SIZE;
                }

                let dist = Math.hypot(clickX - midX, clickY - midY);
                if (dist < minDist) {
                    minDist = dist;
                    closestLine = line;
                }
            });

            if (closestLine) {
                closestLine.owner = gameState.currentPlayerName;
                let boxScored = checkBoxes();

                if (!boxScored) {
                    gameState.currentPlayerName = gameState.currentPlayerName === "Avisha" ? "Dharmik" : "Avisha";
                }
                gameRef.set(gameState);
            }
        }

        // Desktop Mouse Click Handling
        canvas.addEventListener("click", (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        // Mobile Touch Tap Handling
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Prevents double click zooming on mobile browsers
            const touch = e.touches[0];
            handleInteraction(touch.clientX, touch.clientY);
        }, { passive: false });

        function checkBoxes() {
            let closedAnyBox = false;
            gameState.boxes.forEach(box => {
                if (box.owner) return;

                let top = gameState.lines.find(l => l.type === 'H' && l.y1 === box.r && l.x1 === box.c);
                let bottom = gameState.lines.find(l => l.type === 'H' && l.y1 === box.r + 1 && l.x1 === box.c);
                let left = gameState.lines.find(l => l.type === 'V' && l.x1 === box.c && l.y1 === box.r);
                let right = gameState.lines.find(l => l.type === 'V' && l.x1 === box.c + 1 && l.y1 === box.r);

                if (top.owner && bottom.owner && left.owner && right.owner) {
                    box.owner = gameState.currentPlayerName;
                    gameState.scores[gameState.currentPlayerName]++;
                    closedAnyBox = true;
                }
            });
            return closedAnyBox;
        }

        document.getElementById("resetBtn").addEventListener("click", () => {
            gameRef.set(generateInitialState());
        });
    </script>
</body>
</html>
